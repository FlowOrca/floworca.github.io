<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowOrca</title>
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #04101e;
      background: linear-gradient(180deg, #020c1a 0%, #071a2f 30%, #0a2240 60%, #0d2a4a 80%, #061828 100%);
      color: #b0bec5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    /* light rays from above */
    body::before {
      content: '';
      position: fixed;
      top: -40%;
      left: 30%;
      width: 40%;
      height: 120%;
      background: linear-gradient(180deg, rgba(45, 212, 191, 0.04) 0%, rgba(88, 166, 255, 0.02) 40%, transparent 70%);
      transform: skewX(-8deg);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      top: -30%;
      left: 50%;
      width: 30%;
      height: 110%;
      background: linear-gradient(180deg, rgba(88, 166, 255, 0.03) 0%, rgba(45, 212, 191, 0.015) 50%, transparent 75%);
      transform: skewX(6deg);
      pointer-events: none;
      z-index: 0;
    }
    .bubbles {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 1;
    }
    .bubble {
      position: absolute;
      border-radius: 50%;
      border: 1.5px solid rgba(160, 220, 240, 0.25);
      background: radial-gradient(circle at 35% 25%, rgba(255, 255, 255, 0.18), rgba(140, 210, 230, 0.06) 50%, transparent 70%);
      box-shadow:
        inset 0 -2px 4px rgba(45, 212, 191, 0.08),
        inset 2px 2px 3px rgba(255, 255, 255, 0.1),
        0 0 6px rgba(88, 166, 255, 0.06);
      animation: float linear infinite;
      will-change: transform, opacity;
    }
    @keyframes float {
      0% { transform: translateY(100vh) translateX(0) scale(1); opacity: 0; }
      5% { opacity: 0.7; }
      50% { transform: translateY(50vh) translateX(15px) scale(1.05); }
      85% { opacity: 0.5; }
      100% { transform: translateY(-20px) translateX(-10px) scale(0.8); opacity: 0; }
    }
    /* caustic ripple overlay */
    .caustics {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 80px 60px at 20% 30%, rgba(45, 212, 191, 0.025), transparent),
        radial-gradient(ellipse 100px 50px at 60% 50%, rgba(88, 166, 255, 0.02), transparent),
        radial-gradient(ellipse 70px 90px at 80% 70%, rgba(45, 212, 191, 0.02), transparent),
        radial-gradient(ellipse 90px 70px at 40% 80%, rgba(88, 166, 255, 0.018), transparent);
      animation: caustic-drift 12s ease-in-out infinite alternate;
    }
    @keyframes caustic-drift {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(20px, -15px) scale(1.05); }
      100% { transform: translate(-15px, 10px) scale(0.97); }
    }
    /* particles / silt */
    .particle {
      position: absolute;
      width: 1px;
      height: 1px;
      background: rgba(180, 220, 240, 0.2);
      border-radius: 50%;
      animation: drift linear infinite;
      will-change: transform, opacity;
    }
    @keyframes drift {
      0% { transform: translate(0, 0); opacity: 0; }
      20% { opacity: 0.5; }
      80% { opacity: 0.3; }
      100% { transform: translate(var(--dx), var(--dy)); opacity: 0; }
    }
    #gate {
      text-align: center;
      padding: 40px 24px;
    }
    #gate img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 24px;
      mix-blend-mode: lighten;
      backface-visibility: hidden;
    }
    .logo-wrap {
      width: 100px;
      height: 100px;
      margin: 0 auto 24px;
      animation: logo-rock 3s ease-in-out infinite;
    }
    @keyframes logo-rock {
      0% { transform: rotateZ(0deg); }
      25% { transform: rotateZ(4deg); }
      75% { transform: rotateZ(-4deg); }
      100% { transform: rotateZ(0deg); }
    }
    .logo-front {
      width: 100px;
      height: 100px;
    }

    .gate-project {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #fff;
      font-family: 'Courier New', monospace;
      display: inline;
      margin-left: 12px;
      vertical-align: baseline;
    }
    #gate h2 {
      color: #fff;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .gate-tagline {
      color: #7a8a99;
      font-size: 14px;
      margin-bottom: 28px;
      min-height: 1.4em;
    }
    #gate input {
      background: rgba(45, 212, 191, 0.06);
      border: 2px solid rgba(45, 212, 191, 0.2);
      border-radius: 32px;
      padding: 14px 24px;
      font-size: 16px;
      color: #fff;
      font-family: 'Nunito', sans-serif;
      width: 280px;
      text-align: center;
      outline: none;
      box-shadow: 0 0 20px rgba(45, 212, 191, 0.06);
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    #gate input:focus {
      border-color: rgba(45, 212, 191, 0.5);
      box-shadow: 0 0 30px rgba(45, 212, 191, 0.12);
    }
    #gate input::placeholder { color: #3d4f5f; }
    .gate-error {
      color: #ff6b35;
      font-size: 13px;
      margin-top: 12px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .gate-error.show { opacity: 1; }
    .gate-encrypt {
      color: #ff6b35;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 32px;
      min-height: 1.4em;
    }
    .gate-spec {
      color: rgba(122, 138, 153, 0.5);
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 16px;
    }
.gate-products {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-top: 28px;
      margin-bottom: 8px;
    }
    .gate-product {
      text-align: center;
      opacity: 0.6;
      transition: opacity 0.3s;
      cursor: pointer;
    }
    .gate-product:hover {
      opacity: 0.85;
    }
    .gate-product.active {
      opacity: 1;
    }
    .gate-product-name {
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: color 0.3s;
    }
    .gate-product:hover .gate-product-name {
      color: #c4b5fd;
    }
    .gate-product.active .gate-product-name {
      color: #2dd4bf;
    }
    .gate-product-desc {
      color: rgba(122, 138, 153, 0.6);
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .gate-product-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(122, 138, 153, 0.4);
      margin: 8px auto 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .gate-product.active .gate-product-dot {
      background: #2dd4bf;
      box-shadow: 0 0 8px rgba(45, 212, 191, 0.4);
    }
    .gate-product-status {
      color: rgba(255, 107, 53, 0.6);
      font-size: 8px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 6px;
    }

  </style>
</head>
<body>

  <div class="caustics"></div>
  <div class="bubbles" id="bubbles"></div>
  <div id="gate" style="position:relative;z-index:2;">
    <div class="logo-wrap"><img src="logo.png" alt="FlowOrca" class="logo-front" /></div>
    <h2>FlowOrca <span class="gate-project" id="gate-project"></span></h2>
    <div class="gate-tagline" id="gate-tagline"></div>
    <input type="password" id="pw" placeholder="Decryption key" autofocus />
    <div class="gate-error" id="err">Key denied.</div>
    <div class="gate-encrypt" id="gate-encrypt"></div>

    <div class="gate-products">
      <div class="gate-product" data-product="Riptide" tabindex="0" role="button" onclick="selectProduct(this)">
        <div class="gate-product-name" id="gp-riptide"></div>
        <div class="gate-product-desc" id="gp-riptide-desc"></div>
        <div class="gate-product-dot"></div>
        <div class="gate-product-status" id="gp-riptide-status"></div>
      </div>
      <div class="gate-product active" data-product="OrcaVault" tabindex="0" role="button" onclick="selectProduct(this)">
        <div class="gate-product-name" id="gp-orcavault"></div>
        <div class="gate-product-desc" id="gp-orcavault-desc"></div>
        <div class="gate-product-dot"></div>
      </div>
      <div class="gate-product" data-product="Castnet" tabindex="0" role="button" onclick="selectProduct(this)">
        <div class="gate-product-name" id="gp-castnet"></div>
        <div class="gate-product-desc" id="gp-castnet-desc"></div>
        <div class="gate-product-dot"></div>
        <div class="gate-product-status" id="gp-castnet-status"></div>
      </div>
    </div>
    <div class="gate-spec" id="gate-spec"></div>


  </div>

    async function unlock(pw,blob){try{const d=Uint8Array.from(atob(blob),c=>c.charCodeAt(0));const salt=d.slice(0,16),iv=d.slice(16,28),tag=d.slice(28,44),ct=d.slice(44);const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:600000,hash:'SHA-512'},km,{name:'AES-GCM',length:256},false,['decrypt']);const combined=new Uint8Array(ct.length+tag.length);combined.set(ct);combined.set(tag,ct.length);const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,combined);const html=new TextDecoder().decode(dec);document.open();document.write('<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>FlowOrca</title><meta name="robots" content="noindex,nofollow,noarchive,nosnippet"><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet"><\/head><body>'+html+'<\/body><\/html>');document.close();}catch(e){var errEl=document.getElementById('err');errEl.textContent='Invalid key for Project '+activeProduct+'.';errEl.classList.add('show');document.getElementById('pw').value='';}}
    document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter'){var blobs={Riptide:P1,OrcaVault:P2,Castnet:P3};unlock(this.value,blobs[activeProduct]);}});

    // Cipher-decode animation for gateway lines
    (function(){
      var chars='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*';
      var keep=' \u26A1\u00B7';
      function decode(id,target,delay){
        var el=document.getElementById(id);
        if(!el)return;
        var resolved=new Array(target.length).fill(false);
        var display=new Array(target.length);
        for(var i=0;i<target.length;i++) display[i]=keep.indexOf(target[i])>=0?target[i]:chars[Math.floor(Math.random()*chars.length)];
        el.textContent=display.join('');
        setTimeout(function(){
          var tick=0;
          var iv=setInterval(function(){
            tick++;
            for(var i=0;i<target.length;i++){
              if(resolved[i])continue;
              if(keep.indexOf(target[i])>=0){resolved[i]=true;display[i]=target[i];continue;}
              if(tick>3+i*1){resolved[i]=true;display[i]=target[i];}
              else{display[i]=chars[Math.floor(Math.random()*chars.length)];}
            }
            el.textContent=display.join('');
            if(resolved.every(Boolean))clearInterval(iv);
          },25);
        },delay);
      }
      decode('gate-project','PROJECT GATEWAY',0);
      decode('gate-tagline','Decrypt HTML \u26A1 Temp deploy to browser',400);
      decode('gate-encrypt','AES-256-GCM \u00B7 PBKDF2-SHA-512',800);
      decode('gp-riptide','Riptide',1100);
      decode('gp-riptide-desc','Signal Architecture',1250);
      decode('gp-riptide-status','Bespoke',1400);
      decode('gp-orcavault','OrcaVault',1200);
      decode('gp-orcavault-desc','Sovereign AI+',1350);
      decode('gp-castnet','Castnet',1300);
      decode('gp-castnet-desc','Cognitive Meta-Analysis',1450);
      decode('gp-castnet-status','Invite Only',1600);
      decode('gate-spec','Encrypted BLOB at rest \u00B7 Decrypted to memory \u00B7 No clear text server storage \u00B7 Private \u00B7 Non-indexable',750);
    })();
    (function(){
      var c=document.getElementById('bubbles');
      for(var i=0;i<80;i++){
        var b=document.createElement('div');
        b.className='bubble';
        var s=Math.random()*8+3;
        b.style.width=s+'px';
        b.style.height=s+'px';
        b.style.left=Math.random()*100+'%';
        b.style.animationDuration=(Math.random()*14+8)+'s';
        b.style.animationDelay=(Math.random()*12)+'s';
        if(s>7)b.style.borderWidth='2px';
        c.appendChild(b);
      }
      for(var i=0;i<50;i++){
        var p=document.createElement('div');
        p.className='particle';
        p.style.left=Math.random()*100+'%';
        p.style.top=Math.random()*100+'%';
        p.style.setProperty('--dx',(Math.random()*60-30)+'px');
        p.style.setProperty('--dy',(Math.random()*40-20)+'px');
        p.style.animationDuration=(Math.random()*8+5)+'s';
        p.style.animationDelay=(Math.random()*8)+'s';
        var sz=Math.random()<0.3?'2px':'1px';
        p.style.width=sz;
        p.style.height=sz;
        c.appendChild(p);
      }
    })();
    var activeProduct='OrcaVault';
    function selectProduct(el){
      document.querySelectorAll('.gate-product').forEach(function(p){p.classList.remove('active');});
      el.classList.add('active');
      activeProduct=el.getAttribute('data-product');
      document.getElementById('err').classList.remove('show');
    }
    document.querySelectorAll('.gate-product').forEach(function(p){p.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();selectProduct(this);}});});
  </script>
